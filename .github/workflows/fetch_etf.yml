name: 每日抓取 49YTW 基金投資組合

on:
  schedule:
    - cron: "0 1 * * 1-5"
  workflow_dispatch:

jobs:
  fetch-and-analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安裝 Chrome
        uses: browser-actions/setup-chrome@v1

      - name: 安裝套件
        run: pip install selenium webdriver-manager

      - name: 抓取今日持股資料
        run: python fetch_49YTW.py

      - name: 分析持股變化
        run: python analyze_diff.py

      - name: Commit & Push 資料與報告
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ || true
          git add reports/ || true
          git diff --cached --quiet || git commit -m "📊 $(date +'%Y-%m-%d') 49YTW 持股更新與變化報告"
          git push
