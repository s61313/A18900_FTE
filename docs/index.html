<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>49YTW ETF 持股追蹤</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f6f9;
      color: #222;
    }
    header {
      background: linear-gradient(135deg, #1a56db, #0e9f6e);
      color: white;
      padding: 28px 32px 20px;
    }
    header h1 { font-size: 1.7rem; font-weight: 700; }
    header p  { margin-top: 6px; opacity: 0.88; font-size: 0.95rem; }
    .badge {
      display: inline-block;
      margin-top: 10px;
      background: rgba(255,255,255,0.18);
      border-radius: 20px;
      padding: 3px 12px;
      font-size: 0.82rem;
    }
    main { max-width: 1100px; margin: 28px auto; padding: 0 20px; }
    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      padding: 24px;
      margin-bottom: 24px;
    }
    .card h2 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 2px solid #e5e7eb;
      color: #1a56db;
    }
    .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 768px) { .charts { grid-template-columns: 1fr; } }
    .chart-box img {
      width: 100%;
      border-radius: 8px;
      border: 1px solid #e5e7eb;
    }
    .chart-box p {
      margin-top: 8px;
      font-size: 0.85rem;
      color: #666;
      text-align: center;
    }
    .links a {
      display: inline-block;
      margin: 6px 8px 6px 0;
      padding: 8px 16px;
      background: #1a56db;
      color: white;
      border-radius: 6px;
      text-decoration: none;
      font-size: 0.88rem;
      transition: background 0.15s;
    }
    .links a:hover { background: #1447c0; }
    .links a.secondary { background: #6b7280; }
    .links a.secondary:hover { background: #4b5563; }
    #report-content {
      font-size: 0.88rem;
      line-height: 1.7;
      overflow-x: auto;
    }
    #report-content table {
      border-collapse: collapse;
      width: 100%;
      margin: 12px 0;
      font-size: 0.84rem;
    }
    #report-content th, #report-content td {
      border: 1px solid #e5e7eb;
      padding: 6px 10px;
      text-align: left;
    }
    #report-content th { background: #f3f4f6; font-weight: 600; }
    #report-content tr:nth-child(even) td { background: #fafafa; }
    #report-content h1 { font-size: 1.2rem; margin: 16px 0 8px; }
    #report-content h2 { font-size: 1rem; margin: 14px 0 6px; color: #374151; }
    #report-content p  { margin: 6px 0; }
    footer {
      text-align: center;
      padding: 20px;
      color: #9ca3af;
      font-size: 0.82rem;
    }
    .last-updated { color: #6b7280; font-size: 0.85rem; margin-top: 4px; }
  </style>
</head>
<body>

<header>
  <h1>📊 49YTW ETF 持股追蹤</h1>
  <p>每個工作日自動抓取統一投信 49YTW 基金持股，比較前日變化並產生報告</p>
  <span class="badge">⏱ 每日台灣時間 09:00 自動更新</span>
</header>

<main>

  <div class="card">
    <h2>📈 持股趨勢圖表</h2>
    <div class="charts">
      <div class="chart-box">
        <img src="../reports/top10_trend.png" alt="Top 10 持股權重趨勢"
             onerror="this.style.display='none';this.nextElementSibling.textContent='圖表尚未產生，下次 Actions 執行後會自動出現'">
        <p>Top 10 持股權重歷史趨勢</p>
      </div>
      <div class="chart-box">
        <img src="../reports/latest_bar.png" alt="當日持股分佈"
             onerror="this.style.display='none';this.nextElementSibling.textContent='圖表尚未產生，下次 Actions 執行後會自動出現'">
        <p>當日持股分佈 Top 20</p>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>📋 最新持股變化報告</h2>
    <div id="report-content"><p style="color:#9ca3af">載入中...</p></div>
  </div>

  <div class="card">
    <h2>🔗 快速連結</h2>
    <div class="links">
      <a href="../reports/latest_diff.md" target="_blank">最新報告 (Markdown)</a>
      <a href="https://github.com/s61313/A18900_FTE/tree/main/reports" target="_blank" class="secondary">所有報告</a>
      <a href="https://github.com/s61313/A18900_FTE/tree/main/data" target="_blank" class="secondary">歷史 CSV 資料</a>
      <a href="https://github.com/s61313/A18900_FTE/actions" target="_blank" class="secondary">Actions 執行紀錄</a>
    </div>
  </div>

</main>

<footer>
  49YTW ETF 持股追蹤系統 · 資料來源：<a href="https://www.ezmoney.com.tw/ETF/Fund/Info?fundCode=49YTW" target="_blank">ezmoney.com.tw</a>
</footer>

<script>
  const script = document.createElement("script");
  script.src = "https://cdn.jsdelivr.net/npm/marked/marked.min.js";
  script.onload = function () {
    fetch("../reports/latest_diff.md")
      .then(r => r.text())
      .then(md => {
        document.getElementById("report-content").innerHTML = marked.parse(md);
      })
      .catch(() => {
        document.getElementById("report-content").innerHTML =
          '<p style="color:#9ca3af">報告尚未產生，請等待下次 Actions 執行。</p>';
      });
  };
  document.head.appendChild(script);
</script>

</body>
</html>
